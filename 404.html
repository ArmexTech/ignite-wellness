<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-size='80' text-anchor='middle'%3E🔥%3C/text%3E%3C/svg%3E" />
<title>Not found — IGNITE</title>
<style>
  :root{--bg:#0B0B1F;--surface:#1A1A3A;--line:#2B2B52;--muted:#A6A6C6;--pink:#FF2E7E;--orange:#FF7A3D;--yellow:#FFD23F;--mint:#00F0B5;--shadow:0 20px 60px rgba(255,46,126,.25);}
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:#FFF;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .page{min-height:100dvh;display:grid;place-items:center;padding:40px 20px;background:radial-gradient(800px 400px at 50% -10%, rgba(255,46,126,.2), transparent 60%),var(--bg);text-align:center}
  .code{font-size:180px;font-weight:900;letter-spacing:-.06em;line-height:.9;margin:0 0 10px;background:linear-gradient(135deg,var(--pink),var(--orange) 50%,var(--yellow));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 30px 60px rgba(255,46,126,.3)}
  h1{font-size:32px;letter-spacing:-.02em;margin:0 0 12px;line-height:1.1;font-weight:900}
  h1 em{font-style:normal;background:linear-gradient(90deg,var(--pink),var(--yellow));-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);max-width:440px;margin:0 auto 28px;font-size:16px;line-height:1.6}
  .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{padding:14px 22px;border-radius:14px;font-weight:900;font-size:15px;background:var(--surface);color:#fff;border:1px solid var(--line)}
  .btn.primary{background:linear-gradient(135deg,var(--pink),var(--orange) 70%,var(--yellow));color:#0B0B1F;border:0;box-shadow:var(--shadow)}
  .brand{font-weight:900;letter-spacing:.28em;font-size:15px;margin-bottom:30px;background:linear-gradient(90deg,var(--pink),var(--orange) 60%,var(--yellow));-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
  @media(max-width:600px){.code{font-size:120px}h1{font-size:24px}}
</style>
</head>
<body>
<div class="page">
  <div>
    <a href="index.html" class="brand">IGNITE</a>
    <div class="code">404</div>
    <h1>This page is <em>off-plan</em>.</h1>
    <p>The page you're looking for isn't here. Let's get you back to your workout.</p>
    <div class="btns">
      <a class="btn primary" href="index.html">← Back to home</a>
      <a class="btn" href="quiz.html">Take the quiz</a>
      <a class="btn" href="app.html">Open my app</a>
    </div>
  </div>
</div>
</body>
</html>
